name: Feature request
description: Propose a focused standalone capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem, not only the proposed API.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: quality
    attributes:
      label: Quality and safety gates
      description: Explain how failure and model regression should be detected.
    validations:
      required: true
