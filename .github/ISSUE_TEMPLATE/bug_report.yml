name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include database credentials, private model weights, or training data.
  - type: input
    id: version
    attributes:
      label: DreamCycle version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python and PostgreSQL versions
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the exact error and the smallest safe reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
