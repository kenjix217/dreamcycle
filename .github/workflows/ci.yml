name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m ruff format --check .

  postgres:
    name: PostgreSQL and pgvector
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dreamcycle-test
          POSTGRES_DB: dreamcycle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dreamcycle_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DREAMCYCLE_TEST_DSN: postgresql://postgres:dreamcycle-test@127.0.0.1:5432/dreamcycle_test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - name: Enable pgvector in the test database
        run: |
          python - <<'PY'
          import os
          import psycopg

          with psycopg.connect(os.environ["DREAMCYCLE_TEST_DSN"]) as connection:
              connection.execute("CREATE EXTENSION IF NOT EXISTS vector")
          PY
      - run: python -m pytest tests/test_postgres_integration.py -vv

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/verify_distribution.py dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [unit, postgres, package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
